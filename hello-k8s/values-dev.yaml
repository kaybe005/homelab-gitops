fullnameOverride: hello-dev
appName: hello-dev
replicaCount: 1

image:
  repository: ghcr.io/kaybe005/hello-app
  tag: "latest"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: traefik
  host: hello-dev.home.lab

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
