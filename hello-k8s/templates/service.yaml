apiVersion: v1
kind: Service
metadata:
  name: {{ include "hello-k8s.fullname" . }}
  labels:
{{ include "hello-k8s.labels" . | indent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
{{ include "hello-k8s.selectorLabels" . | indent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 80
      protocol: TCP
      name: http